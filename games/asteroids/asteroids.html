<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Asteroids — NeonQuarter Arcade</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#020408;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'VT323',monospace;color:#00e5ff;}
    body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,0.28) 3px,rgba(0,0,0,0.28) 4px);pointer-events:none;z-index:100;}
    body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.8) 100%);pointer-events:none;z-index:101;}
    .back{position:fixed;top:0.6rem;left:1.2rem;font-family:'VT323',monospace;font-size:1rem;color:#ffb000;text-decoration:none;letter-spacing:2px;z-index:200;}
    .back:hover{color:#00ff41;}
    h1{font-family:'Silkscreen',monospace;font-size:1.6rem;letter-spacing:4px;color:#00e5ff;text-shadow:0 0 15px #00e5ff;margin-bottom:0.3rem;}
    .hud{display:flex;gap:2.5rem;margin-bottom:0.4rem;font-size:1.1rem;letter-spacing:2px;justify-content:center;}
    .hud-item{display:flex;flex-direction:column;align-items:center;}
    .hud-label{font-size:0.6rem;color:#2a5540;letter-spacing:3px;}
    .hud-val{color:#ffb000;font-family:'Silkscreen',monospace;font-size:0.85rem;}
    .lives-row{display:flex;gap:6px;margin-bottom:0.4rem;justify-content:center;min-height:18px;}
    canvas{border:2px solid #00e5ff;box-shadow:0 0 20px rgba(0,229,255,0.25);background:#000;display:block;}
    .info{margin-top:0.4rem;font-size:0.75rem;color:#2a5540;letter-spacing:2px;text-align:center;}
    #msg{position:absolute;font-family:'Silkscreen',monospace;font-size:0.85rem;letter-spacing:2px;color:#00e5ff;text-shadow:0 0 10px #00e5ff;text-align:center;display:none;line-height:2;background:rgba(0,0,0,0.92);padding:1.2rem 2rem;border:1px solid #00e5ff;}
    .wrap{position:relative;display:flex;align-items:center;justify-content:center;}
  </style>
</head>
<body>
<h1>ASTEROIDS</h1>
<div class="hud">
  <div class="hud-item"><div class="hud-label">SCORE</div><div class="hud-val" id="score">0</div></div>
  <div class="hud-item"><div class="hud-label">BEST</div><div class="hud-val" id="best">0</div></div>
  <div class="hud-item"><div class="hud-label">LEVEL</div><div class="hud-val" id="level">1</div></div>
</div>
<div class="lives-row" id="livesRow"></div>
<div class="wrap">
  <canvas id="c" width="560" height="480"></canvas>
  <div id="msg"></div>
</div>
<div class="info">← → ROTATE &nbsp;|&nbsp; ↑ THRUST &nbsp;|&nbsp; SPACE SHOOT &nbsp;|&nbsp; SPACE TO START</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ── AUDIO ──
const AC = new (window.AudioContext || window.webkitAudioContext)();
function beep(f,d,t,v){try{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=t||'square';o.frequency.value=f;g.gain.setValueAtTime(v||0.08,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d);}catch(e){}}
function sndShoot(){beep(600,0.08,'square',0.09);}
function sndBigAst(){beep(100,0.2,'sawtooth',0.15);setTimeout(()=>beep(80,0.15,'sawtooth',0.12),80);}
function sndMedAst(){beep(150,0.15,'sawtooth',0.12);setTimeout(()=>beep(120,0.1,'sawtooth',0.1),60);}
function sndSmallAst(){beep(250,0.1,'sawtooth',0.1);}
function sndDie(){[200,150,100,70].forEach((f,i)=>setTimeout(()=>beep(f,0.12,'sawtooth',0.15),i*80));}
function sndWin(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.1,'sine',0.1),i*80));}
function sndThrust(){beep(80+Math.random()*40,0.05,'sawtooth',0.04);}

// ── GAME STATE ──
let ship, asteroids, bullets, particles, score, best, lives, level, running, started, animId, frame, invTimer, keys;

// ── SHIP ──
function createShip() {
  return {
    x: W/2, y: H/2,
    vx: 0, vy: 0,
    angle: -Math.PI/2,  // pointing up
    thrusting: false,
    dead: false,
    r: 12,              // collision radius
  };
}

// ── ASTEROID ──
function createAsteroid(x, y, size) {
  const speed = (0.8 + Math.random() * 1.2) * (1 + level * 0.1);
  const angle = Math.random() * Math.PI * 2;
  const numVerts = 7 + Math.floor(Math.random() * 5);
  const verts = [];
  for (let i = 0; i < numVerts; i++) {
    const a = (i / numVerts) * Math.PI * 2;
    const r = size * (0.7 + Math.random() * 0.5);
    verts.push({ x: Math.cos(a) * r, y: Math.sin(a) * r });
  }
  return {
    x, y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    size,
    r: size * 0.85,
    rot: 0,
    rotSpeed: (Math.random() - 0.5) * 0.05,
    verts,
  };
}

function spawnAsteroids() {
  asteroids = [];
  const count = 3 + level;
  for (let i = 0; i < count; i++) {
    // Spawn away from ship
    let x, y;
    do {
      x = Math.random() * W;
      y = Math.random() * H;
    } while (Math.hypot(x - W/2, y - H/2) < 120);
    asteroids.push(createAsteroid(x, y, 40));
  }
}

function init() {
  score = 0; lives = 3; level = 1;
  best  = +localStorage.getItem('astBest') || 0;
  keys  = {};
  ship  = createShip();
  bullets = []; particles = [];
  invTimer = 0; frame = 0;
  running = false; started = false;
  spawnAsteroids();
  updateHUD(); drawLives();
  showMsg('ASTEROIDS\n\nPRESS SPACE\nTO START', true);
  cancelAnimationFrame(animId);
  animId = requestAnimationFrame(loop);
}

function showMsg(txt, p) {
  const m = document.getElementById('msg');
  m.style.display = 'block';
  m.innerHTML = txt.replace(/\n/g, '<br/>');
  if (!p) setTimeout(() => m.style.display = 'none', 1800);
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent  = best;
  document.getElementById('level').textContent = level;
}

function drawLives() {
  const row = document.getElementById('livesRow');
  row.innerHTML = '';
  for (let i = 0; i < lives; i++) {
    const s = document.createElement('canvas'); s.width = 18; s.height = 18;
    const c = s.getContext('2d');
    c.strokeStyle = '#00e5ff'; c.lineWidth = 1.5; c.shadowBlur = 6; c.shadowColor = '#00e5ff';
    c.beginPath(); c.moveTo(9, 2); c.lineTo(15, 16); c.lineTo(9, 13); c.lineTo(3, 16); c.closePath(); c.stroke();
    row.appendChild(s);
  }
}

// ── PHYSICS ──
function wrap(obj) {
  if (obj.x < 0)  obj.x += W;
  if (obj.x > W)  obj.x -= W;
  if (obj.y < 0)  obj.y += H;
  if (obj.y > H)  obj.y -= H;
}

function update() {
  if (!running) return;
  frame++;
  if (invTimer > 0) invTimer--;

  // Ship controls
  if (!ship.dead) {
    if (keys.ArrowLeft  || keys.a) ship.angle -= 0.06;
    if (keys.ArrowRight || keys.d) ship.angle += 0.06;
    if (keys.ArrowUp    || keys.w) {
      ship.vx += Math.cos(ship.angle) * 0.25;
      ship.vy += Math.sin(ship.angle) * 0.25;
      ship.thrusting = true;
      if (frame % 3 === 0) sndThrust();
    } else {
      ship.thrusting = false;
    }
    // Friction
    ship.vx *= 0.99;
    ship.vy *= 0.99;
    // Max speed
    const spd = Math.hypot(ship.vx, ship.vy);
    if (spd > 6) { ship.vx = ship.vx/spd*6; ship.vy = ship.vy/spd*6; }
    ship.x += ship.vx; ship.y += ship.vy;
    wrap(ship);
  }

  // Bullets
  bullets.forEach(b => { b.x += b.vx; b.y += b.vy; b.life--; });
  bullets = bullets.filter(b => b.life > 0);

  // Asteroids
  asteroids.forEach(a => {
    a.x += a.vx; a.y += a.vy;
    a.rot += a.rotSpeed;
    wrap(a);
  });

  // Bullet vs asteroid
  for (let bi = bullets.length - 1; bi >= 0; bi--) {
    for (let ai = asteroids.length - 1; ai >= 0; ai--) {
      const b = bullets[bi], a = asteroids[ai];
      if (Math.hypot(b.x - a.x, b.y - a.y) < a.r) {
        // Hit!
        const pts = a.size > 25 ? 20 : a.size > 12 ? 50 : 100;
        score += pts * level;
        if (score > best) { best = score; localStorage.setItem('astBest', best); }
        updateHUD();

        // Sound
        if (a.size > 25) sndBigAst(); else if (a.size > 12) sndMedAst(); else sndSmallAst();

        // Explode particles
        burst(a.x, a.y, '#00e5ff', 8);

        // Split asteroid
        if (a.size > 12) {
          asteroids.push(createAsteroid(a.x, a.y, a.size / 2));
          asteroids.push(createAsteroid(a.x, a.y, a.size / 2));
        }

        asteroids.splice(ai, 1);
        bullets.splice(bi, 1);
        break;
      }
    }
  }

  // Ship vs asteroid
  if (!ship.dead && invTimer <= 0) {
    for (const a of asteroids) {
      if (Math.hypot(ship.x - a.x, ship.y - a.y) < a.r + ship.r - 4) {
        killShip();
        break;
      }
    }
  }

  // Level clear
  if (asteroids.length === 0) {
    sndWin(); running = false; level++;
    showMsg('WAVE ' + level + '!\nGET READY!', false);
    setTimeout(() => { spawnAsteroids(); bullets = []; ship = createShip(); invTimer = 150; running = true; updateHUD(); }, 2000);
  }

  // Particles
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vx *= 0.96; p.vy *= 0.96; p.life--; });
  particles = particles.filter(p => p.life > 0);
}

function killShip() {
  ship.dead = true;
  sndDie();
  burst(ship.x, ship.y, '#ffb000', 16);
  lives--;
  drawLives();
  if (lives <= 0) {
    running = false;
    showMsg('GAME OVER\nSCORE: ' + score, true);
    return;
  }
  setTimeout(() => {
    ship = createShip();
    invTimer = 180;
    ship.dead = false;
  }, 1500);
}

function burst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = Math.random() * 4 + 1;
    particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, life: 25+Math.random()*20, color });
  }
}

// ── DRAW ──
function drawShip() {
  if (ship.dead) return;
  if (invTimer > 0 && Math.floor(frame / 6) % 2 === 0) return; // flashing

  ctx.save();
  ctx.translate(ship.x, ship.y);
  ctx.rotate(ship.angle);

  // Thrust flame
  if (ship.thrusting) {
    ctx.strokeStyle = '#ff6600';
    ctx.shadowBlur = 15; ctx.shadowColor = '#ff6600';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-8, 5); ctx.lineTo(-16 - Math.random()*8, 0); ctx.lineTo(-8, -5);
    ctx.stroke();
  }

  // Ship body
  ctx.strokeStyle = '#00e5ff';
  ctx.shadowBlur = 12; ctx.shadowColor = '#00e5ff';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(14, 0);
  ctx.lineTo(-10, 9);
  ctx.lineTo(-6, 0);
  ctx.lineTo(-10, -9);
  ctx.closePath();
  ctx.stroke();

  // Cockpit
  ctx.strokeStyle = '#ffb000'; ctx.shadowColor = '#ffb000';
  ctx.beginPath(); ctx.arc(4, 0, 3, 0, Math.PI*2); ctx.stroke();

  ctx.restore();
  ctx.shadowBlur = 0;
}

function drawAsteroid(a) {
  ctx.save();
  ctx.translate(a.x, a.y);
  ctx.rotate(a.rot);

  const glow = a.size > 25 ? '#00e5ff' : a.size > 12 ? '#ffb000' : '#ff003c';
  ctx.strokeStyle = glow;
  ctx.shadowBlur = 8; ctx.shadowColor = glow;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(a.verts[0].x, a.verts[0].y);
  for (let i = 1; i < a.verts.length; i++) ctx.lineTo(a.verts[i].x, a.verts[i].y);
  ctx.closePath(); ctx.stroke();

  ctx.restore();
  ctx.shadowBlur = 0;
}

function draw() {
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);

  // Stars
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  for (let i = 0; i < 80; i++) {
    const sx = (i * 137 + 50) % W;
    const sy = (i * 89  + 30) % H;
    const ss = i % 3 === 0 ? 1.5 : 0.8;
    ctx.fillRect(sx, sy, ss, ss);
  }

  // Asteroids
  asteroids.forEach(drawAsteroid);

  // Bullets
  bullets.forEach(b => {
    ctx.fillStyle = '#ffff00'; ctx.shadowBlur = 8; ctx.shadowColor = '#ffff00';
    ctx.beginPath(); ctx.arc(b.x, b.y, 2.5, 0, Math.PI*2); ctx.fill();
  });
  ctx.shadowBlur = 0;

  // Ship
  drawShip();

  // Particles
  particles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life / 45;
    ctx.shadowBlur = 4; ctx.shadowColor = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;

  // Shoot cooldown bar (subtle)
  if (shootCooldown > 0) {
    ctx.fillStyle = 'rgba(255,255,0,0.3)';
    ctx.fillRect(10, H - 8, (1 - shootCooldown / MAX_COOLDOWN) * 80, 3);
  }
}

let shootCooldown = 0;
const MAX_COOLDOWN = 12;

function loop() {
  if (running) shootCooldown = Math.max(0, shootCooldown - 1);
  update();
  draw();
  animId = requestAnimationFrame(loop);
}

// ── CONTROLS ──
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  keys[e.code] = true;

  if (e.code === 'Space') {
    e.preventDefault();
    if (!started) {
      started = true; running = true;
      document.getElementById('msg').style.display = 'none';
      return;
    }
    // Shoot
    if (!ship.dead && shootCooldown <= 0 && running) {
      bullets.push({
        x: ship.x + Math.cos(ship.angle) * 16,
        y: ship.y + Math.sin(ship.angle) * 16,
        vx: Math.cos(ship.angle) * 9 + ship.vx,
        vy: Math.sin(ship.angle) * 9 + ship.vy,
        life: 55,
      });
      shootCooldown = MAX_COOLDOWN;
      sndShoot();
    }
  }
});

document.addEventListener('keyup', e => {
  keys[e.key] = false;
  keys[e.code] = false;
});

init();
</script>
</body>
</html>
