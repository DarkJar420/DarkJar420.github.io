<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Frogger — NeonQuarter Arcade</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Silkscreen&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#020408;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'VT323',monospace;color:#00ff41;}
    body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,0.3) 3px,rgba(0,0,0,0.3) 4px);pointer-events:none;z-index:100;}
    body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.8) 100%);pointer-events:none;z-index:101;}
    .back{position:fixed;top:1rem;left:1.5rem;font-family:'VT323',monospace;font-size:1rem;color:#ffb000;text-decoration:none;letter-spacing:2px;z-index:200;}
    .back:hover{color:#00ff41;}
    h1{font-family:'Silkscreen',monospace;font-size:2rem;letter-spacing:4px;color:#00ff41;text-shadow:0 0 15px #00ff41;margin-bottom:0.5rem;}
    .hud{display:flex;gap:3rem;margin-bottom:0.8rem;font-size:1.2rem;letter-spacing:3px;}
    .hud span{color:#ffb000;}
    canvas{border:2px solid #00ff41;box-shadow:0 0 20px rgba(0,255,65,0.3);background:#000;display:block;}
    .info{margin-top:0.8rem;font-size:0.9rem;color:#2a5540;letter-spacing:2px;text-align:center;}
    #msg{position:absolute;font-family:'Silkscreen',monospace;font-size:1rem;letter-spacing:2px;color:#00ff41;text-shadow:0 0 10px #00ff41;text-align:center;display:none;line-height:2;background:rgba(0,0,0,0.9);padding:1.5rem 2rem;}
    .wrap{position:relative;display:flex;align-items:center;justify-content:center;}
  </style>
</head>
<body>
<a class="back" href="/index.html">← BACK TO ARCADE</a>
<h1>FROGGER</h1>
<div class="hud"><div>SCORE: <span id="score">0</span></div><div>LIVES: <span id="lives">3</span></div><div>LEVEL: <span id="level">1</span></div></div>
<div class="wrap">
  <canvas id="c" width="420" height="480"></canvas>
  <div id="msg"></div>
</div>
<div class="info">ARROW KEYS / WASD TO HOP &nbsp;|&nbsp; SPACE TO START</div>

<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;
const TILE=42,COLS=10,ROWS=11;

let frog,lanes,score,lives,level,running,started,animId,safe;

const LANE_CONFIG=[
  {type:'safe',color:'#030f08'},           // row 10 - start
  {type:'road',dir:1,speed:2,color:'#0a0a0a',cars:3,carColor:'#ff003c'},    // row 9
  {type:'road',dir:-1,speed:2.5,color:'#0a0a0a',cars:2,carColor:'#ffb000'}, // row 8
  {type:'road',dir:1,speed:1.5,color:'#0a0a0a',cars:3,carColor:'#cc00ff'},  // row 7
  {type:'road',dir:-1,speed:3,color:'#0a0a0a',cars:2,carColor:'#ff6600'},   // row 6
  {type:'safe',color:'#030f08'},           // row 5 - median
  {type:'water',dir:1,speed:2,color:'#000d1a',logs:2,logW:90},  // row 4
  {type:'water',dir:-1,speed:1.5,color:'#000d1a',logs:3,logW:70},// row 3
  {type:'water',dir:1,speed:2.5,color:'#000d1a',logs:2,logW:80}, // row 2
  {type:'water',dir:-1,speed:1,color:'#000d1a',logs:3,logW:60},  // row 1
  {type:'goal',color:'#020f06'},           // row 0 - goal
];

function init(){
  score=0;lives=3;level=1;
  document.getElementById('score').textContent=score;
  document.getElementById('lives').textContent=lives;
  document.getElementById('level').textContent=level;
  resetFrog();
  buildLanes();
  safe=Array(5).fill(false);
  showMsg('FROGGER\n\nPRESS SPACE\nTO START',true);
  running=false;started=false;
  cancelAnimationFrame(animId);animId=requestAnimationFrame(loop);
}

function resetFrog(){frog={x:W/2-TILE/2,y:H-TILE,onLog:null,dead:false};}

function buildLanes(){
  lanes=LANE_CONFIG.map((cfg,i)=>{
    const lane={...cfg,y:i*TILE,items:[]};
    if(cfg.type==='road'){
      for(let j=0;j<cfg.cars;j++)lane.items.push({x:j*(W/cfg.cars),w:TILE*1.5,color:cfg.carColor});
    }
    if(cfg.type==='water'){
      for(let j=0;j<cfg.logs;j++)lane.items.push({x:j*(W/cfg.logs),w:cfg.logW});
    }
    return lane;
  });
}

function showMsg(txt,persist){const m=document.getElementById('msg');m.style.display='block';m.innerHTML=txt.replace(/\n/g,'<br/>');if(!persist)setTimeout(()=>m.style.display='none',1500);}

function update(){
  if(!running||frog.dead)return;

  // Move lane objects
  lanes.forEach(lane=>{
    if(lane.type==='road'||lane.type==='water'){
      lane.items.forEach(item=>{
        item.x+=lane.dir*(lane.speed+level*0.3);
        if(item.x>W+100)item.x=-item.w-10;
        if(item.x<-item.w-10)item.x=W+100;
      });
    }
  });

  // Get frog's row
  const row=Math.floor(frog.y/TILE);
  const lane=lanes[row];
  frog.onLog=null;

  if(lane){
    if(lane.type==='water'){
      let onALog=false;
      lane.items.forEach(log=>{
        if(frog.x+TILE>log.x&&frog.x<log.x+log.w){
          onALog=true;frog.onLog=log;frog.x+=lane.dir*(lane.speed+level*0.3);
        }
      });
      if(!onALog){die();return;}
    }
    if(lane.type==='road'){
      lane.items.forEach(car=>{
        if(frog.x+TILE-4>car.x&&frog.x+4<car.x+car.w){die();return;}
      });
    }
    if(lane.type==='goal'){
      score+=100+level*50;document.getElementById('score').textContent=score;
      showMsg('SAFE!\n+'+( 100+level*50),false);
      resetFrog();
      // Check all 5 goals reached (simplified: just reset after each)
    }
  }

  // Out of bounds
  if(frog.x<0||frog.x+TILE>W)die();
}

function die(){
  frog.dead=true;lives--;document.getElementById('lives').textContent=lives;
  if(lives<=0){running=false;showMsg('GAME OVER\nSCORE: '+score,true);}
  else{showMsg('SPLAT!',false);setTimeout(()=>{resetFrog();frog.dead=false;},1000);}
}

function draw(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

  // Draw lanes
  lanes.forEach((lane,i)=>{
    ctx.fillStyle=lane.color;ctx.fillRect(0,i*TILE,W,TILE);
    if(lane.type==='road'){
      // Lane markings
      ctx.strokeStyle='rgba(255,176,0,0.15)';ctx.setLineDash([20,20]);ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(0,i*TILE+TILE/2);ctx.lineTo(W,i*TILE+TILE/2);ctx.stroke();
      ctx.setLineDash([]);
      // Cars
      lane.items.forEach(car=>{
        ctx.fillStyle=car.color;ctx.shadowBlur=8;ctx.shadowColor=car.color;
        ctx.fillRect(car.x,i*TILE+6,car.w,TILE-12);
        ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(car.x+8,i*TILE+8,car.w-16,TILE-18);
        // Headlights
        ctx.fillStyle='#ffffaa';
        if(lane.dir>0){ctx.fillRect(car.x+car.w-6,i*TILE+10,4,6);ctx.fillRect(car.x+car.w-6,i*TILE+TILE-18,4,6);}
        else{ctx.fillRect(car.x+2,i*TILE+10,4,6);ctx.fillRect(car.x+2,i*TILE+TILE-18,4,6);}
        ctx.shadowBlur=0;
      });
    }
    if(lane.type==='water'){
      // Ripple effect
      ctx.fillStyle='rgba(0,100,200,0.15)';
      for(let rx=0;rx<W;rx+=30)ctx.fillRect(rx+(Date.now()/50)%30,i*TILE+TILE/2-2,20,4);
      // Logs
      lane.items.forEach(log=>{
        ctx.fillStyle='#5c3a1a';ctx.shadowBlur=0;
        ctx.fillRect(log.x,i*TILE+6,log.w,TILE-12);
        ctx.fillStyle='#7a4f26';ctx.fillRect(log.x,i*TILE+6,log.w,8);
        ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fillRect(log.x,i*TILE+6,log.w,4);
      });
    }
    if(lane.type==='safe'){
      // Safe zone strips
      ctx.fillStyle='rgba(0,255,65,0.05)';ctx.fillRect(0,i*TILE,W,TILE);
    }
    if(lane.type==='goal'){
      ctx.fillStyle='rgba(0,255,65,0.1)';ctx.fillRect(0,i*TILE,W,TILE);
      ctx.fillStyle='rgba(0,255,65,0.3)';
      for(let gx=0;gx<5;gx++)ctx.strokeRect(gx*(W/5)+4,i*TILE+4,W/5-8,TILE-8);
    }
  });

  // Frog
  if(!frog.dead){
    const fx=frog.x,fy=frog.y;
    ctx.fillStyle='#00ff41';ctx.shadowBlur=10;ctx.shadowColor='#00ff41';
    // Body
    ctx.beginPath();ctx.ellipse(fx+TILE/2,fy+TILE/2,14,12,0,0,Math.PI*2);ctx.fill();
    // Eyes
    ctx.fillStyle='#fff';ctx.shadowBlur=0;
    ctx.beginPath();ctx.arc(fx+TILE/2-7,fy+TILE/2-6,5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(fx+TILE/2+7,fy+TILE/2-6,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.arc(fx+TILE/2-7,fy+TILE/2-6,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(fx+TILE/2+7,fy+TILE/2-6,2.5,0,Math.PI*2);ctx.fill();
    // Legs
    ctx.fillStyle='#00cc33';ctx.shadowBlur=0;
    ctx.fillRect(fx,fy+TILE/2-4,10,6);ctx.fillRect(fx+TILE-10,fy+TILE/2-4,10,6);
    ctx.fillRect(fx+4,fy+TILE-10,10,10);ctx.fillRect(fx+TILE-14,fy+TILE-10,10,10);
    ctx.shadowBlur=0;
  }
}

function loop(){update();draw();animId=requestAnimationFrame(loop);}

document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();if(!started||!running){started=true;running=true;document.getElementById('msg').style.display='none';}return;}
  if(!running||frog.dead)return;
  if(e.key==='ArrowUp'   ||e.key==='w'){e.preventDefault();frog.y=Math.max(0,frog.y-TILE);}
  if(e.key==='ArrowDown' ||e.key==='s'){e.preventDefault();frog.y=Math.min(H-TILE,frog.y+TILE);}
  if(e.key==='ArrowLeft' ||e.key==='a'){e.preventDefault();frog.x=Math.max(0,frog.x-TILE);}
  if(e.key==='ArrowRight'||e.key==='d'){e.preventDefault();frog.x=Math.min(W-TILE,frog.x+TILE);}
});

init();
</script>
</body>
</html>
