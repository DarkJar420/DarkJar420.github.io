<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snake — NeonQuarter Arcade</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Silkscreen&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #020408;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh;
      font-family: 'VT323', monospace;
      color: #00ff41;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.3) 3px, rgba(0,0,0,0.3) 4px);
      pointer-events: none; z-index: 100;
    }
    body::after {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.8) 100%);
      pointer-events: none; z-index: 101;
    }
    .back-link {
      position: fixed; top: 1rem; left: 1.5rem;
      font-family: 'VT323', monospace; font-size: 1rem;
      color: #ffb000; text-decoration: none; letter-spacing: 2px;
      z-index: 200;
    }
    .back-link:hover { color: #00ff41; }
    h1 {
      font-family: 'Silkscreen', monospace;
      font-size: 2rem; letter-spacing: 4px;
      color: #00ff41;
      text-shadow: 0 0 15px #00ff41;
      margin-bottom: 0.5rem;
    }
    .hud {
      display: flex; gap: 3rem; margin-bottom: 1rem;
      font-size: 1.2rem; letter-spacing: 3px;
    }
    .hud span { color: #ffb000; }
    canvas {
      border: 2px solid #00ff41;
      box-shadow: 0 0 20px rgba(0,255,65,0.3), 0 0 60px rgba(0,255,65,0.1);
      background: #000;
    }
    .controls {
      margin-top: 1rem; font-size: 1rem;
      color: #2a5540; letter-spacing: 2px; text-align: center;
    }
    #message {
      position: absolute;
      font-family: 'Silkscreen', monospace;
      font-size: 1.2rem; letter-spacing: 3px;
      color: #ffb000;
      text-shadow: 0 0 10px #ffb000;
      text-align: center;
      display: none;
    }
    .canvas-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
    .btn {
      margin-top: 1rem;
      font-family: 'Silkscreen', monospace; font-size: 0.7rem;
      letter-spacing: 2px; padding: 0.6rem 1.8rem;
      background: #00ff41; color: #000; border: none;
      cursor: pointer; display: none;
      clip-path: polygon(5px 0%, 100% 0%, calc(100% - 5px) 100%, 0% 100%);
      box-shadow: 0 0 15px #00ff41;
    }
    .btn:hover { background: #ffb000; box-shadow: 0 0 15px #ffb000; }
  </style>
</head>
<body>
  <a class="back-link" href="/index.html">← BACK TO ARCADE</a>
  <h1>SNAKE</h1>
  <div class="hud">
    <div>SCORE: <span id="score">0</span></div>
    <div>BEST: <span id="best">0</span></div>
    <div>LEVEL: <span id="level">1</span></div>
  </div>
  <div class="canvas-wrap">
    <canvas id="c" width="400" height="400"></canvas>
    <div id="message"></div>
  </div>
  <button class="btn" id="restartBtn">▶ PLAY AGAIN</button>
  <div class="controls">
    ARROW KEYS / WASD TO MOVE &nbsp;|&nbsp; PRESS SPACE TO START
  </div>

<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl  = document.getElementById('best');
  const levelEl = document.getElementById('level');
  const msgEl   = document.getElementById('message');
  const btn     = document.getElementById('restartBtn');

  const GRID = 20;
  const COLS = canvas.width  / GRID;
  const ROWS = canvas.height / GRID;

  let snake, dir, nextDir, food, score, best, level, speed, loop, running, started;

  function init() {
    snake   = [{x:10, y:10}, {x:9,y:10}, {x:8,y:10}];
    dir     = {x:1, y:0};
    nextDir = {x:1, y:0};
    score   = 0;
    level   = 1;
    speed   = 150;
    running = false;
    started = false;
    best    = parseInt(localStorage.getItem('snakeBest') || '0');
    scoreEl.textContent = score;
    bestEl.textContent  = best;
    levelEl.textContent = level;
    placeFood();
    btn.style.display = 'none';
    showMsg('PRESS SPACE\nTO START', true);
    draw();
  }

  function placeFood() {
    do {
      food = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS) };
    } while (snake.some(s => s.x===food.x && s.y===food.y));
  }

  function showMsg(text, persist) {
    msgEl.style.display = 'block';
    msgEl.innerHTML = text.replace(/\n/g, '<br/>');
    if (!persist) setTimeout(() => msgEl.style.display='none', 1500);
  }

  function start() {
    if (running) return;
    running = true;
    started = true;
    msgEl.style.display = 'none';
    clearInterval(loop);
    loop = setInterval(tick, speed);
  }

  function tick() {
    dir = {...nextDir};
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // Wall collision
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
    // Self collision
    if (snake.some(s => s.x===head.x && s.y===head.y)) return gameOver();

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = score;
      if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem('snakeBest', best); }
      // Level up every 5 points
      if (score % 5 === 0) {
        level++;
        levelEl.textContent = level;
        speed = Math.max(60, speed - 15);
        clearInterval(loop);
        loop = setInterval(tick, speed);
      }
      placeFood();
    } else {
      snake.pop();
    }
    draw();
  }

  function gameOver() {
    clearInterval(loop);
    running = false;
    showMsg('GAME OVER\nSCORE: ' + score, true);
    btn.style.display = 'inline-block';
  }

  function draw() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid dots
    ctx.fillStyle = 'rgba(0,255,65,0.06)';
    for (let x=0; x<COLS; x++) for (let y=0; y<ROWS; y++) {
      ctx.fillRect(x*GRID + GRID/2 - 1, y*GRID + GRID/2 - 1, 2, 2);
    }

    // Food — pulsing
    const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 200);
    ctx.shadowBlur = 15 * pulse;
    ctx.shadowColor = '#ff003c';
    ctx.fillStyle = '#ff003c';
    ctx.fillRect(food.x*GRID+2, food.y*GRID+2, GRID-4, GRID-4);
    ctx.shadowBlur = 0;

    // Snake
    snake.forEach((seg, i) => {
      const ratio = i / snake.length;
      ctx.shadowBlur = i === 0 ? 15 : 0;
      ctx.shadowColor = '#00ff41';
      ctx.fillStyle = i === 0 ? '#00ff41' : `rgba(0, ${Math.floor(200 - ratio*120)}, ${Math.floor(65 - ratio*30)}, 1)`;
      ctx.fillRect(seg.x*GRID+1, seg.y*GRID+1, GRID-2, GRID-2);
    });
    ctx.shadowBlur = 0;

    // Eyes on head
    const h = snake[0];
    ctx.fillStyle = '#000';
    if (dir.x === 1)       { ctx.fillRect(h.x*GRID+14, h.y*GRID+4,  3,3); ctx.fillRect(h.x*GRID+14, h.y*GRID+13, 3,3); }
    else if (dir.x === -1) { ctx.fillRect(h.x*GRID+3,  h.y*GRID+4,  3,3); ctx.fillRect(h.x*GRID+3,  h.y*GRID+13, 3,3); }
    else if (dir.y === -1) { ctx.fillRect(h.x*GRID+4,  h.y*GRID+3,  3,3); ctx.fillRect(h.x*GRID+13, h.y*GRID+3,  3,3); }
    else                   { ctx.fillRect(h.x*GRID+4,  h.y*GRID+14, 3,3); ctx.fillRect(h.x*GRID+13, h.y*GRID+14, 3,3); }
  }

  // Controls
  document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); if (!started || !running) start(); return; }
    if (!running) return;
    if ((e.key==='ArrowUp'   ||e.key==='w') && dir.y!== 1) nextDir={x:0,y:-1};
    if ((e.key==='ArrowDown' ||e.key==='s') && dir.y!==-1) nextDir={x:0,y: 1};
    if ((e.key==='ArrowLeft' ||e.key==='a') && dir.x!== 1) nextDir={x:-1,y:0};
    if ((e.key==='ArrowRight'||e.key==='d') && dir.x!==-1) nextDir={x: 1,y:0};
  });

  btn.addEventListener('click', () => { init(); start(); });

  // Animate food pulse even when waiting
  function idleDraw() { if (!running) draw(); requestAnimationFrame(idleDraw); }

  init();
  idleDraw();
</script>
</body>
</html>
