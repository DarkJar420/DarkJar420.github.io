<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2048 — NeonQuarter Arcade</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Silkscreen&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#020408;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'VT323',monospace;color:#ffb000;padding:1rem;}
    body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,0.3) 3px,rgba(0,0,0,0.3) 4px);pointer-events:none;z-index:100;}
    body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.8) 100%);pointer-events:none;z-index:101;}
    .back{position:fixed;top:1rem;left:1.5rem;font-family:'VT323',monospace;font-size:1rem;color:#ffb000;text-decoration:none;letter-spacing:2px;z-index:200;}
    .back:hover{color:#00ff41;}
    h1{font-family:'Silkscreen',monospace;font-size:2rem;letter-spacing:4px;color:#ffb000;text-shadow:0 0 15px #ffb000;margin-bottom:0.5rem;}
    .hud{display:flex;gap:2rem;margin-bottom:1rem;font-size:1.2rem;letter-spacing:3px;}
    .hud-box{border:1px solid #0d2a30;padding:0.4rem 1rem;text-align:center;background:#060d10;}
    .hud-label{font-size:0.7rem;letter-spacing:3px;color:#2a5540;}
    .hud-val{font-family:'Silkscreen',monospace;font-size:1.1rem;color:#ffb000;text-shadow:0 0 8px #ffb000;}
    .board{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;background:#030a0e;padding:10px;border:2px solid #0d2a30;position:relative;}
    .cell{width:90px;height:90px;display:flex;align-items:center;justify-content:center;font-family:'Silkscreen',monospace;font-size:1.4rem;letter-spacing:1px;background:#060d10;border:1px solid #0d2a30;transition:transform 0.1s;}
    .info{margin-top:1rem;font-size:0.9rem;color:#2a5540;letter-spacing:2px;text-align:center;}
    .btn{margin-top:1rem;font-family:'Silkscreen',monospace;font-size:0.65rem;letter-spacing:2px;padding:0.6rem 1.8rem;background:#ffb000;color:#000;border:none;cursor:pointer;clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);box-shadow:0 0 15px #ffb000;}
    #overlay{position:absolute;inset:0;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center;flex-direction:column;gap:1rem;font-family:'Silkscreen',monospace;font-size:1rem;letter-spacing:2px;color:#ffb000;text-shadow:0 0 10px #ffb000;text-align:center;}
  </style>
</head>
<body>
<a class="back" href="/index.html">← BACK TO ARCADE</a>
<h1>2048</h1>
<div class="hud">
  <div class="hud-box"><div class="hud-label">SCORE</div><div class="hud-val" id="score">0</div></div>
  <div class="hud-box"><div class="hud-label">BEST</div><div class="hud-val" id="best">0</div></div>
</div>
<div class="board" id="board">
  <div id="overlay"></div>
</div>
<button class="btn" id="newBtn">NEW GAME</button>
<div class="info">ARROW KEYS / WASD TO SLIDE TILES</div>

<script>
const COLORS={
  0:   {bg:'#060d10',color:'transparent',shadow:'none'},
  2:   {bg:'#001a0a',color:'#00ff41',shadow:'#00ff41'},
  4:   {bg:'#001a14',color:'#00e5b0',shadow:'#00e5b0'},
  8:   {bg:'#001a1a',color:'#00e5ff',shadow:'#00e5ff'},
  16:  {bg:'#00101a',color:'#0099ff',shadow:'#0099ff'},
  32:  {bg:'#0a001a',color:'#6600ff',shadow:'#6600ff'},
  64:  {bg:'#1a001a',color:'#cc00ff',shadow:'#cc00ff'},
  128: {bg:'#1a000a',color:'#ff003c',shadow:'#ff003c'},
  256: {bg:'#1a0500',color:'#ff3300',shadow:'#ff3300'},
  512: {bg:'#1a0d00',color:'#ff6600',shadow:'#ff6600'},
  1024:{bg:'#1a1400',color:'#ffaa00',shadow:'#ffaa00'},
  2048:{bg:'#1a1a00',color:'#ffff00',shadow:'#ffff00'},
};

let grid,score,best;

function init(){
  grid=Array.from({length:4},()=>Array(4).fill(0));
  score=0;best=parseInt(localStorage.getItem('2048best')||'0');
  addTile();addTile();
  document.getElementById('score').textContent=score;
  document.getElementById('best').textContent=best;
  document.getElementById('overlay').style.display='none';
  render();
}

function addTile(){
  const empty=[];
  grid.forEach((r,ri)=>r.forEach((c,ci)=>{if(!c)empty.push([ri,ci]);}));
  if(!empty.length)return;
  const [r,c]=empty[Math.floor(Math.random()*empty.length)];
  grid[r][c]=Math.random()<0.9?2:4;
}

function render(){
  const board=document.getElementById('board');
  // Remove old cells (keep overlay)
  [...board.querySelectorAll('.cell')].forEach(e=>e.remove());
  grid.forEach((row,ri)=>row.forEach((val,ci)=>{
    const cell=document.createElement('div');
    cell.className='cell';
    const col=COLORS[val]||{bg:'#1a1a00',color:'#fff',shadow:'#fff'};
    cell.style.background=col.bg;
    cell.style.color=col.color;
    cell.style.textShadow=col.shadow!=='none'?`0 0 10px ${col.shadow}`:'none';
    cell.style.border=val?`1px solid ${col.color}`:'1px solid #0d2a30';
    if(val){cell.textContent=val;if(val>=1024)cell.style.fontSize='1rem';}
    board.insertBefore(cell,document.getElementById('overlay'));
  }));
  document.getElementById('score').textContent=score;
  document.getElementById('best').textContent=best;
}

function slide(row){
  let r=row.filter(x=>x);
  for(let i=0;i<r.length-1;i++){if(r[i]===r[i+1]){r[i]*=2;score+=r[i];if(score>best){best=score;localStorage.setItem('2048best',best);}r.splice(i+1,1);}}
  while(r.length<4)r.push(0);
  return r;
}

function move(dir){
  let moved=false;
  const g=grid.map(r=>[...r]);
  if(dir==='left') grid=grid.map(r=>{const s=slide(r);if(s.join()!==r.join())moved=true;return s;});
  if(dir==='right') grid=grid.map(r=>{const s=slide([...r].reverse()).reverse();if(s.join()!==r.join())moved=true;return s;});
  if(dir==='up'||dir==='down'){
    for(let c=0;c<4;c++){
      let col=grid.map(r=>r[c]);
      if(dir==='down')col.reverse();
      const s=slide(col);
      if(dir==='down')s.reverse();
      if(s.join()!==col.join())moved=true;
      grid.forEach((r,ri)=>r[c]=s[ri]);
    }
  }
  if(moved){addTile();render();checkEnd();}
}

function checkEnd(){
  if(grid.some(r=>r.some(c=>c===2048))){showOverlay('YOU WIN!\nSCORE: '+score);return;}
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    if(!grid[r][c])return;
    if(c<3&&grid[r][c]===grid[r][c+1])return;
    if(r<3&&grid[r][c]===grid[r+1][c])return;
  }
  showOverlay('GAME OVER\nSCORE: '+score);
}

function showOverlay(txt){
  const o=document.getElementById('overlay');
  o.style.display='flex';
  o.innerHTML=txt.replace(/\n/g,'<br/>');
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a'){e.preventDefault();move('left');}
  if(e.key==='ArrowRight'||e.key==='d'){e.preventDefault();move('right');}
  if(e.key==='ArrowUp'||e.key==='w'){e.preventDefault();move('up');}
  if(e.key==='ArrowDown'||e.key==='s'){e.preventDefault();move('down');}
});

// Touch support
let tx,ty;
document.getElementById('board').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.getElementById('board').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)){move(dx>0?'right':'left');}else{move(dy>0?'down':'up');}
},{passive:true});

document.getElementById('newBtn').addEventListener('click',init);
init();
</script>
</body>
</html>
